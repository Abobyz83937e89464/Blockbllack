<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, touch-action=none">
    <title>Block Blast HARDCORE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="screen-wrapper">
            <div id="preloader" class="active">
                <div class="loader">LOAD...</div>
            </div>

            <div id="main-menu" class="screen">
                <div class="background-overlay"></div>
                <h1>BLOCK BLAST<br><span class="hardcore">HARDCORE</span></h1>
                <button id="start-btn" class="ui-button">
                    <span>НАЧАТЬ</span>
                </button>
            </div>

            <div id="game-screen" class="screen">
                <div id="hud">
                    <div id="score-display">СЧЕТ: 0</div>
                    <div id="timer-bar">
                        <div id="timer-fill"></div>
                        <span>МЕЧ: <span id="time-left">20s</span></span>
                    </div>
                </div>
                <div id="canvas-wrapper">
                    <canvas id="game-canvas"></canvas>
                    <canvas id="vfx-canvas"></canvas>
                </div>
                <div id="hotbar">
                    <div class="figure-slot" data-slot="0"></div>
                    <div class="figure-slot" data-slot="1"></div>
                    <div class="figure-slot" data-slot="2"></div>
                </div>
            </div>

            <div id="final-screen" class="screen">
                <div class="white-overlay"></div>
                <canvas id="final-canvas"></canvas>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
