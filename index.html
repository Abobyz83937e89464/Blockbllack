<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Neo — Calamity Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg" id="bg-layer">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div id="cosmic-bg" class="cosmic-bg hidden">
        <canvas id="cosmic-canvas"></canvas>
    </div>

    <!-- Multi-layer flash system -->
    <div id="white-flash" class="white-flash"></div>
    <div id="red-flash" class="red-flash"></div>

    <!-- Ascension cinematic overlay -->
    <div id="ascension-overlay" class="ascension-overlay">
        <div id="ascension-text" class="ascension-text"></div>
        <div id="question-marks" class="question-marks"></div>
    </div>

    <div id="ui-layer">
        <div id="preloader">
            <div class="loader-box">
                <div class="loader-title">NEO SYSTEM BOOT</div>
                <div class="progress-container"><div id="progress-bar"></div></div>
                <div id="status-text" class="status-text">INITIALIZING...</div>
                <div id="asset-list" class="asset-list"></div>
            </div>
        </div>

        <div id="main-menu" class="screen active">
            <h1 class="logo">BLOCK BLAST<br><span class="neon">HARDCORE</span></h1>
            <div class="subtitle">CALAMITY EDITION</div>
            <div class="menu-actions">
                <button id="start-btn" class="neo-btn pulse">START SESSION</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="game-ui-container">
                <div id="hud">
                    <div class="hud-row">
                        <div class="score-box">SCORE: <span id="score">0000</span></div>
                        <div id="timer-box" class="timer-box hidden">
                            <div class="timer-label gold">⚔ MAIN SWORD</div>
                            <div class="timer-bar-wrap"><div id="main-sword-fill" class="timer-fill main"></div></div>
                            <div class="timer-label purple">✦ DIVINE SWORD</div>
                            <div class="timer-bar-wrap"><div id="divine-sword-fill" class="timer-fill divine"></div></div>
                        </div>
                    </div>
                    <div id="boss-hud" class="boss-hud hidden">
                        <div class="boss-name-tag">⚔ NAMELESS DEITY ⚔</div>
                        <div class="boss-hp-container">
                            <div id="boss-hp-bar" class="boss-hp-bar"></div>
                            <div id="boss-hp-text" class="boss-hp-text">5000 / 5000</div>
                        </div>
                        <div id="boss-wave-tag" class="boss-wave-tag">WAVE 1</div>
                    </div>
                </div>

                <div id="canvas-wrapper">
                    <canvas id="game-canvas"></canvas>
                </div>

                <div id="hotbar">
                    <div class="slot" data-slot="0"></div>
                    <div class="slot" data-slot="1"></div>
                    <div class="slot" data-slot="2"></div>
                </div>
            </div>
        </div>

        <div id="game-over-screen" class="screen">
            <div class="game-over-box">
                <div class="go-icon-wrap"><img id="go-skull" class="go-skull" src="" alt="💀"></div>
                <h1 class="game-over-title">DIVINE<br>RETRIBUTION</h1>
                <div class="game-over-score">SCORE: <span id="final-score">0000</span></div>
                <div class="game-over-sub">The Nameless Deity has judged you unworthy.</div>
                <button id="retry-btn" class="neo-btn pulse">RETRY</button>
                <button id="menu-btn" class="neo-btn secondary">MAIN MENU</button>
            </div>
        </div>

        <div id="boss-defeat-screen" class="screen">
            <div class="game-over-box victory">
                <div class="go-icon">👑</div>
                <h1 class="game-over-title victory-title">DEITY<br>VANQUISHED</h1>
                <div class="game-over-score">FINAL SCORE: <span id="victory-score">0000</span></div>
                <div class="game-over-sub">You have transcended mortality.</div>
                <button id="victory-menu-btn" class="neo-btn pulse">ASCEND</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
